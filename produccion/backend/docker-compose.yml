version: '3.8'

services:
  nestjs_app:
    build:
      context: ./backend
      dockerfile: ./Dockerfile
    container_name: nestjs_app
    restart: always
    env_file:
      - .env.production
    expose:
      - "3000"
    networks:
      - pos_network

  nginx_proxy:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80" # Escucha solo en HTTP (puerto 80)
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_var:/var/www/certbot:ro # Preparado para el challenge de Let's Encrypt
    depends_on:
      - nestjs_app
    networks:
      - pos_network

  # Comentamos Certbot temporalmente hasta que el dominio de NIC Argentina esté delegado
  # certbot:
  #   image: certbot/certbot
  #   container_name: certbot
  #   volumes:
  #     - certbot_etc:/etc/letsencrypt
  #     - certbot_var:/var/www/certbot
  #   entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
  #   networks:
  #     - pos_network

volumes:
  certbot_etc: # Guardará los certificados cuando se generen
  certbot_var:

networks:
  pos_network:
    driver: bridge
