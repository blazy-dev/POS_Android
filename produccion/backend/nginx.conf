server {
    listen 80;
    listen [::]:80;
    server_name _; # Responde a cualquier host o IP pública directa

    # Límite máximo de subida de archivos (para logos, comprobantes, etc.)
    client_max_body_size 10M;

    # Habilitar Compresión Gzip
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/vnd.geo+json
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/bmp
        image/svg+xml
        image/x-icon
        text/cache-manifest
        text/css
        text/plain
        text/vcard
        text/vnd.rim.location.code
        text/vtt
        text/x-component
        text/x-cross-domain-policy;

    # Proxy reverso para NestJS App
    location / {
        proxy_pass http://nestjs_app:3000;
        proxy_http_version 1.1;
        
        # Configuración para soportar WebSockets en tiempo real
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Cabeceras de origen e IP del cliente original
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts para evitar desconexiones prematuras de sockets
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Ruta para el challenge de Let's Encrypt / Certbot (se deja lista para cuando delegues el dominio)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
